# Substrate compose file for the hierarchical agent orchestration methodology.
#
# Long-lived services (git-server, architect) come up via plain
#   docker compose up -d git-server architect
#
# Ephemeral services (planner, coder-daemon, auditor) are gated by the
# "ephemeral" profile and brought up by commission-pair.sh / audit.sh in
# their own compose project namespace (so multiple pairs can run in parallel
# without name collisions).
#
# Note: the agent-base image is NOT a compose service — it is a build
# dependency for the role images and is built explicitly by the setup
# scripts before `docker compose build` runs.

services:

  # ---------------------------------------------------------------------------
  # git-server: hosts main.git and auditor.git as bare repos. Hand-rolled
  # debian + sshd + git; the per-role update hook enforces spec §3.3.
  # ---------------------------------------------------------------------------
  git-server:
    build: ./infra/git-server
    image: agent-git-server:latest
    container_name: agent-git-server
    volumes:
      - main-repo-bare:/srv/git/main.git
      - auditor-repo-bare:/srv/git/auditor.git
      - ./infra/keys:/srv/keys:ro
    networks:
      - agent-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # architect: long-lived persistent claude-code session paired with the human.
  # ---------------------------------------------------------------------------
  architect:
    build: ./infra/architect
    image: agent-architect:latest
    container_name: agent-architect
    depends_on:
      - git-server
    environment:
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      # s009: the platform plugin selection from substrate setup. Used
      # by the architect to record platform invariants in SHARED-STATE.md.
      # The state files at /substrate/{platforms,devices}.txt are the
      # durable record; the env vars are a convenience for shells.
      SUBSTRATE_PLATFORMS:  ${SUBSTRATE_PLATFORMS:-default}
      SUBSTRATE_DEVICES:    ${SUBSTRATE_DEVICES:-}
      # s010: comma-separated <name>=<user>@<host>[:<port>] specs — empty
      # if no remote hosts are registered. Convenience for shells; the
      # /substrate/remote-hosts.txt mount is the durable record.
      SUBSTRATE_REMOTE_HOSTS: ${SUBSTRATE_REMOTE_HOSTS:-}
    volumes:
      - architect-workspace:/work
      - architect-auditor-clone:/auditor
      - claude-state-architect:/home/agent/.claude
      - ./methodology:/methodology:ro
      - ./infra/keys/architect:/home/agent/.ssh:ro
      # s009: substrate state — read-only mount of the host's
      # .substrate-state/ directory (per-clone, gitignored). Setup
      # writes platforms.txt and devices.txt; the architect-guide
      # paragraph in §10 directs the architect to read these when
      # initializing or updating SHARED-STATE.md.
      - ./.substrate-state:/substrate:ro
      # s010: remote-host integration. The rendered ssh-config lives
      # inside infra/keys/<role>/ already (render-ssh-config.sh writes
      # it as ./config in each role's keys dir), so the existing
      # /home/agent/.ssh:ro mount surfaces it at /home/agent/.ssh/config
      # without needing a layered :ro file mount (Docker rejects
      # layering a file mount inside a :ro directory mount).
      # Per-host private keys, the cumulative known-hosts, and the
      # audit-logging wrapper are mounted at independent paths.
      - ./infra/keys/remote-hosts:/home/agent/.ssh-remote-hosts:ro
      - ./.substrate-state/known-hosts:/home/agent/.ssh-known-hosts:ro
      - ./infra/scripts/agent-ssh-audited.sh:/usr/local/bin/ssh:ro
    networks:
      - agent-net
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # planner: ephemeral, per section. Started by commission-pair.sh.
  # No container_name — multiple pairs may run in parallel under different
  # compose project namespaces.
  # ---------------------------------------------------------------------------
  planner:
    build: ./infra/planner
    image: agent-planner:latest
    profiles: ["ephemeral"]
    depends_on:
      - coder-daemon
    environment:
      COMMISSION_HOST:   ${COMMISSION_HOST:-coder-daemon}
      COMMISSION_PORT:   ${COMMISSION_PORT:-}
      COMMISSION_TOKEN:  ${COMMISSION_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - claude-state-shared:/home/agent/.claude
      - ./methodology:/methodology:ro
      - ./infra/keys/planner:/home/agent/.ssh:ro
    networks:
      - agent-net
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # coder-daemon: ephemeral, paired with planner. HTTP commissioning service.
  # Built from Dockerfile.generated, rendered at setup time by
  # infra/scripts/render-dockerfile.sh from the role's static Dockerfile
  # plus the selected platform plugin layer(s) (s009).
  # ---------------------------------------------------------------------------
  coder-daemon:
    build:
      context: ./infra/coder-daemon
      dockerfile: Dockerfile.generated
    image: agent-coder-daemon:latest
    profiles: ["ephemeral"]
    environment:
      COMMISSION_PORT:   ${COMMISSION_PORT:-}
      COMMISSION_TOKEN:  ${COMMISSION_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # s010: convenience env (durable record is /substrate/remote-hosts.txt).
      SUBSTRATE_REMOTE_HOSTS: ${SUBSTRATE_REMOTE_HOSTS:-}
    volumes:
      - coder-daemon-state:/data
      - claude-state-shared:/home/agent/.claude
      - ./methodology:/methodology:ro
      - ./infra/keys/coder:/home/agent/.ssh:ro
      # s010: remote-host integration — same shape as architect.
      - ./.substrate-state/remote-hosts.txt:/substrate/remote-hosts.txt:ro
      - ./infra/keys/remote-hosts:/home/agent/.ssh-remote-hosts:ro
      - ./.substrate-state/known-hosts:/home/agent/.ssh-known-hosts:ro
      - ./.substrate-state/ssh-config:/home/agent/.ssh/config:ro
      - ./infra/scripts/agent-ssh-audited.sh:/usr/local/bin/ssh:ro
    networks:
      - agent-net

  # ---------------------------------------------------------------------------
  # auditor: ephemeral, per audit. Started by audit.sh.
  # Built from Dockerfile.generated (s009; see coder-daemon comment).
  # ---------------------------------------------------------------------------
  auditor:
    build:
      context: ./infra/auditor
      dockerfile: Dockerfile.generated
    image: agent-auditor:latest
    profiles: ["ephemeral"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # s010: convenience env (durable record is /substrate/remote-hosts.txt).
      SUBSTRATE_REMOTE_HOSTS: ${SUBSTRATE_REMOTE_HOSTS:-}
    volumes:
      - claude-state-shared:/home/agent/.claude
      - ./methodology:/methodology:ro
      - ./infra/keys/auditor:/home/agent/.ssh:ro
      # s010: remote-host integration — same shape as architect.
      - ./.substrate-state/remote-hosts.txt:/substrate/remote-hosts.txt:ro
      - ./infra/keys/remote-hosts:/home/agent/.ssh-remote-hosts:ro
      - ./.substrate-state/known-hosts:/home/agent/.ssh-known-hosts:ro
      - ./.substrate-state/ssh-config:/home/agent/.ssh/config:ro
      - ./infra/scripts/agent-ssh-audited.sh:/usr/local/bin/ssh:ro
    networks:
      - agent-net
    stdin_open: true
    tty: true

volumes:
  main-repo-bare:
  auditor-repo-bare:
  architect-workspace:
  architect-auditor-clone:
  coder-daemon-state:
  # claude-code authentication state — see brief §4.10. Declared external
  # so they are NOT removed by 'compose down -v' (which would wipe the user's
  # auth) and so they have stable, fixed names usable from any compose
  # project (long-lived setup, or per-pair commission-pair.sh / audit.sh).
  # The setup scripts pre-create them via 'docker volume create'.
  #
  # claude-state-architect carries the substrate-identity label
  # 'app.turtle-core.substrate-id=<uuid>' — set by setup at volume-create
  # time, paired with the .substrate-id sentinel at the repo root. The
  # label is not declared here because compose ignores configuration on
  # external volumes; setup-common.sh and the --adopt-existing-substrate
  # flag are the canonical writers. See methodology/deployment-docker.md
  # §3.5 for the full identity model.
  claude-state-architect:
    external: true
    name: claude-state-architect
  claude-state-shared:
    external: true
    name: claude-state-shared

# agent-net is shared across compose project namespaces so an ephemeral
# planner pair (run with -p <pair>) can reach the long-lived git-server.
# The setup scripts pre-create it (idempotent: 'docker network create' if
# absent). Per-pair isolation is enforced by the daemon's bearer token +
# source-IP checks, not by network segmentation.
networks:
  agent-net:
    external: true
    name: agent-net
